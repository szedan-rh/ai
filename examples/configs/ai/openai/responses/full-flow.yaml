# Responses API Full Flow
#
# Combines format classification, request validation, and backend
# routing into a single pipeline. This is the unified config that
# operators would deploy for a Responses API gateway:
#
#   1. openai_responses_format classifies the request and rejects
#      unknown/invalid/non-JSON traffic. It promotes format, model,
#      stream, and mode to internal routing headers.
#
#   2. openai_responses_validate checks parameter combinations
#      (stream+background, background+store), generates response
#      and conversation IDs, and writes responses.* metadata for
#      downstream filters. Skips non-Responses requests gracefully.
#
#   3. The router sends all valid Responses API create requests to
#      the same inference backend. The promoted mode remains available
#      as headers/metadata for downstream filters; it does not change
#      backend selection in this example. Once #354 orchestration
#      filters land, stateful requests could use a separate filter
#      chain with response_store, rehydrate, tool_parse, etc. before
#      reaching the same inference backend.
#
# A request is stateful when any of these hold:
#   - previous_response_id is set
#   - tools array is non-empty
#   - store is true (the OpenAI spec default when omitted)
#   - background is true
#   - conversation is set
#   - prompt_id is set
#
# Example requests:
#
#   # Stateful (store defaults to true) — validated and routed
#   curl -X POST http://localhost:8080/v1/responses \
#     -H "Content-Type: application/json" \
#     -d '{"model":"gpt-4.1","input":"Hello, world!"}'
#
#   # Stateless (store=false, no stateful markers) — validated and routed
#   curl -X POST http://localhost:8080/v1/responses \
#     -H "Content-Type: application/json" \
#     -d '{"model":"gpt-4.1","input":"Hello","store":false}'
#
#   # Rejected (stream + background conflict)
#   curl -X POST http://localhost:8080/v1/responses \
#     -H "Content-Type: application/json" \
#     -d '{"model":"gpt-4.1","input":"test","stream":true,"background":true}'
#
# Requires the ai-inference feature:
#   cargo build -p praxis --features ai-inference

listeners:
  - name: ai-gateway
    address: "127.0.0.1:8080"
    filter_chains: [responses-pipeline]

filter_chains:
  - name: responses-pipeline
    filters:
      - filter: openai_responses_format
        on_invalid: reject
        headers:
          format: x-praxis-ai-format
          model: x-praxis-ai-model
          stream: x-praxis-ai-stream
          mode: x-praxis-responses-mode

      - filter: openai_responses_validate

      - filter: openai_response_store
        backend: sqlite
        # In-memory:
        #   database_url: "sqlite::memory:"
        # File-backed:
        database_url: "sqlite://responses.db?mode=rwc"
        responses_table: openai_responses
        conversations_table: openai_conversations
        # Future #354 orchestration filters would follow here:
        #   - filter: rehydrate
        #   - filter: compact
        #   - filter: tool_parse
        #   - filter: responses_proxy
        #   - filter: stream_events
        #   - filter: tool_dispatch
        #   - filter: reasoning

      - filter: router
        routes:
          - path: "/v1/responses"
            headers:
              x-praxis-ai-format: "openai_responses"
            cluster: "inference-backend"

      - filter: load_balancer
        clusters:
          - name: "inference-backend"
            endpoints:
              - "127.0.0.1:3001"
